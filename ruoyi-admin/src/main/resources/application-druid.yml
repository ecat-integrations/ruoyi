spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: org.postgresql.Driver
    druid:
      master:
        url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?useUnicode=true&characterEncoding=UTF-8&allowMultiQueries=true&serverTimezone=Asia/Shanghai
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
      slave:
        enabled: false
        url:
        username:
        password:

      # ===================== 关键修改（只改这里） =====================
      initialSize: 0          # 启动不创建连接
      minIdle: 0              # 最小连接数0
      testOnBorrow: true      # 使用时检查连接
      validationQuery: SELECT 1
      breakAfterAcquireFailure: false  # 连接失败不中断池
      failFast: false                  # 不快速失败
      # =================================================================

      maxActive: 20
      maxWait: 60000
      connectTimeout: 30000
      socketTimeout: 60000
      timeBetweenEvictionRunsMillis: 60000
      minEvictableIdleTimeMillis: 300000
      maxEvictableIdleTimeMillis: 900000
      testWhileIdle: true
      testOnReturn: false

      webStatFilter:
        enabled: true
      statViewServlet:
        enabled: true
        allow:
        url-pattern: /druid/*
        login-username: ruoyi
        login-password: 123456
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: false
        wall:
          config:
            multi-statement-allow: true
